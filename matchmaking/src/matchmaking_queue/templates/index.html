<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Matchmaking</title>
</head>
<body>
    <h1>Matchmaking</h1>
    <form id="matchmaking">
        <label for="uuid">UUID:</label>
        <input type="text" id="uuid" name="uuid" required>
        <br>
        <label for="elo">Elo:</label>
        <input type="text" id="elo" name="elo" required>
        <br>
        <button type="submit">Find match</button>
        <button type="button" id="randomize">Randomize</button>
    </form>
    <button type="button" id="matchmaking-start">Start matchmaking</button>
    <button type="button" id="matchmaking-info">Queue info</button>
    <script>
        const form = document.querySelector('#matchmaking');
        const randomize = document.querySelector('#randomize');
        const start = document.querySelector('#matchmaking-start');
        const info = document.querySelector('#matchmaking-info');
        const uuid_input = document.querySelector('#uuid');
        const elo_input = document.querySelector('#elo');

        const queueSocket = new WebSocket(
            'ws://'
            + window.location.host
            + '/ws/queue/'
        );

        queueSocket.onmessage = (e) => {
            const json = JSON.parse(e.data);
            console.log(json);
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            queueSocket.send(JSON.stringify({
                'type': 'matchmaking.join',
                'data': {
                    'user_id': uuid_input.value,
                    'elo': parseInt(elo_input.value, 10),
                }
            }));
            uuid_input.value = ''
            elo_input.value = ''
        }

        randomize.onclick = (e) => {
            uuid_input.value = Math.floor(Math.random() * 100000)
            elo_input.value = Math.floor(Math.random() * 10000)
        }
        start.onclick = (e) => {
            queueSocket.send(JSON.stringify({
                'type': 'matchmaking.start',
                'data': {}
            }));
        }
        info.onclick = (e) => {
            queueSocket.send(JSON.stringify({
                'type': 'matchmaking.info',
                'data': {}
            }));
        }

    </script>
</body>
</html>
